<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>인천온누리 유치2부 출결관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .header-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); }
        .attendance-card { transition: transform 0.1s ease, box-shadow 0.2s ease; }
        .attendance-card:active { transform: scale(0.97); }
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98); display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999; display: none;
        }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; justify-content: center;
            align-items: center; z-index: 1000; padding: 20px;
            backdrop-filter: blur(4px);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 select-none">

    <div id="loading-overlay">
        <div class="relative w-16 h-16">
            <div class="absolute top-0 left-0 w-full h-full border-4 border-blue-100 rounded-full"></div>
            <div class="absolute top-0 left-0 w-full h-full border-4 border-blue-600 rounded-full border-t-transparent animate-spin"></div>
        </div>
        <p class="mt-4 text-sm font-bold text-slate-500" id="loading-text">데이터를 동기화 중입니다...</p>
    </div>

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative bg-white shadow-2xl border-x border-slate-100">
        <header class="sticky top-0 z-40 header-gradient text-white pt-10 pb-5 px-6 shadow-md rounded-b-[2rem]">
            <div class="flex justify-between items-center mb-1">
                <button id="backBtn" class="invisible w-10 h-10 flex items-center justify-center -ml-2 rounded-full hover:bg-white/10" onclick="goBack()">
                    <i class="fa-solid fa-chevron-left text-lg"></i>
                </button>
                <div class="text-center">
                    <h1 class="text-[10px] font-bold opacity-70 tracking-[0.3em] uppercase mb-0.5">Onnuri ICN Youth</h1>
                    <p class="text-lg font-black tracking-tight">유치2부 출결관리</p>
                </div>
                <button class="w-10 h-10 flex items-center justify-center -mr-2 rounded-full hover:bg-white/10" onclick="location.reload()">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto custom-scrollbar px-5 py-6 pb-28">
            <section id="view-dashboard" class="space-y-6">
                <div class="flex justify-between items-center px-1">
                    <h2 class="text-xl font-extrabold text-slate-800">전체 현황 <span id="displayDate" class="ml-2 text-xs text-blue-600 font-bold bg-blue-50 px-2 py-1 rounded-full"></span></h2>
                </div>

                <!-- 통계 카드 섹션 -->
                <div class="bg-white rounded-[2rem] border border-slate-100 shadow-sm overflow-hidden">
                    <div class="grid grid-cols-2 bg-slate-50 py-3 px-4 text-[10px] font-black text-slate-400 text-center uppercase tracking-widest border-b border-slate-100">
                        <div>구분</div><div>실시간 인원</div>
                    </div>
                    <div class="divide-y divide-slate-50" id="stat-rows-container"></div>
                </div>

                <!-- 학급 버튼 컨테이너 -->
                <div class="space-y-8" id="class-lists-container"></div>
                
                <!-- 사역 지원팀 섹션 -->
                <div class="pt-4 border-t border-slate-100">
                    <h3 class="font-bold text-slate-800 ml-1 mb-3 flex items-center gap-2">
                        <i class="fa-solid fa-user-tie text-indigo-500 text-sm"></i> 사역 지원팀 및 교역자
                    </h3>
                    <div id="teacher-unassigned-container"></div>
                </div>
            </section>

            <!-- 출결 체크 화면 -->
            <section id="view-attendance" class="hidden space-y-6">
                <div class="p-6 bg-slate-900 rounded-[2.5rem] text-white relative overflow-hidden shadow-xl">
                    <div class="relative z-10">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <p class="text-[10px] font-bold text-blue-400 uppercase tracking-[0.2em] mb-1">인천온누리 유치2부</p>
                                <h3 id="targetClassName" class="text-2xl font-black">학급명</h3>
                            </div>
                            <span id="targetClassAge" class="bg-white/10 px-3 py-1 rounded-full text-[10px] font-black border border-white/10">구분</span>
                        </div>
                        <p class="text-sm opacity-60 font-medium" id="targetClassTeacher">정보</p>
                    </div>
                    <i class="fa-solid fa-users absolute -right-6 -bottom-6 text-8xl text-white opacity-5"></i>
                </div>

                <div id="members-list" class="space-y-3"></div>

                <div class="pt-6 space-y-3 border-t border-slate-100">
                    <button onclick="openEntryModal()" class="w-full py-4 bg-slate-100 border border-slate-200 rounded-2xl text-slate-500 text-sm font-bold flex items-center justify-center gap-2 active:bg-slate-200 transition-colors">
                        <i class="fa-solid fa-user-plus text-xs"></i> 명단에 없는 인원 직접 추가
                    </button>
                    <button onclick="adjustCounter('visitor', 1)" class="w-full p-5 border border-blue-100 bg-blue-50/30 rounded-2xl flex items-center justify-between active:bg-blue-100 transition-colors">
                        <div class="text-left">
                            <span class="text-sm font-extrabold text-blue-900 block">방문자/기타 수동 합계</span>
                            <span class="text-[10px] text-blue-500 font-bold uppercase">Manual Count +1</span>
                        </div>
                        <span class="w-10 h-10 flex items-center justify-center bg-blue-600 text-white font-black rounded-xl text-sm shadow-md">+1</span>
                    </button>
                </div>
            </section>

            <!-- 설정 화면 -->
            <section id="view-settings" class="hidden space-y-6">
                <div class="bg-white rounded-3xl border border-slate-100 p-6 shadow-sm space-y-6">
                    <div>
                        <h3 class="text-xl font-black mb-1 text-slate-800">구글 시트 연동</h3>
                        <p class="text-[11px] text-slate-400">명단 데이터를 분석하고 새친구 주차를 자동 관리합니다.</p>
                    </div>
                    <div class="space-y-4">
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider ml-1">학생 명단 CSV URL (2부)</label>
                            <input type="url" id="sheetUrlInput" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-[11px] outline-none" placeholder="Student CSV URL">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider ml-1">교사 명단 CSV URL (통합)</label>
                            <input type="url" id="teacherSheetUrlInput" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-[11px] outline-none" placeholder="Teacher CSV URL">
                        </div>
                        <button onclick="syncAll()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                            <i class="fa-solid fa-arrows-rotate"></i> 시트 동기화 및 주차 초기화
                        </button>
                    </div>
                    <div class="h-px bg-slate-100 my-2"></div>
                    <button onclick="exportExcel()" class="w-full py-4 bg-green-600 text-white rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2">
                        <i class="fa-solid fa-file-export"></i> 출결 보고서 엑셀 저장
                    </button>
                    <div class="text-center pt-4 border-t border-slate-50">
                        <p class="text-[9px] text-slate-300 font-bold uppercase tracking-widest">Version 12.2 (Compact NewFriends Layout)</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- 네비게이션 -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/80 backdrop-blur-md border-t border-slate-100 flex justify-around px-6 py-4 z-50">
            <button onclick="showHome()" class="flex flex-col items-center gap-1 text-blue-600" id="nav-home">
                <i class="fa-solid fa-house-chimney text-xl"></i>
                <span class="text-[9px] font-black uppercase">Home</span>
            </button>
            <button onclick="showSettings()" class="flex flex-col items-center gap-1 text-slate-300" id="nav-settings">
                <i class="fa-solid fa-gear text-xl"></i>
                <span class="text-[9px] font-black uppercase">Setup</span>
            </button>
            <button onclick="resetTodayData()" class="flex flex-col items-center gap-1 text-slate-300">
                <i class="fa-solid fa-trash-can text-xl"></i>
                <span class="text-[9px] font-black uppercase">Reset</span>
            </button>
        </nav>
        <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full text-xs font-bold opacity-0 transition-all pointer-events-none z-[60] shadow-2xl min-w-[200px] text-center">메시지</div>
    </div>

    <!-- 명단 추가 모달 -->
    <div id="add-entry-modal" class="modal-overlay">
        <div class="bg-white rounded-[2rem] w-full max-w-xs p-7 shadow-2xl space-y-6">
            <h3 class="text-xl font-black text-center">직접 명단 추가</h3>
            <div class="grid grid-cols-2 gap-2 p-1 bg-slate-100 rounded-2xl">
                <button onclick="setEntryType('student')" id="type-student" class="py-2 rounded-xl font-black text-xs bg-white text-blue-600">학생</button>
                <button onclick="setEntryType('teacher')" id="type-teacher" class="py-2 rounded-xl font-black text-xs text-slate-400">교사</button>
            </div>
            <input type="text" id="entryName" class="w-full p-4 bg-slate-50 rounded-2xl text-center font-bold outline-none" placeholder="성함 입력">
            <p class="text-[10px] text-center text-slate-400">현재 보고 있는 반에 추가됩니다.</p>
            <div class="flex gap-2">
                <button onclick="closeEntryModal()" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold">취소</button>
                <button onclick="submitNewMember()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">추가</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlp-PpxgxPBXj0Ek1H-b52GjwiU8KyD5A",
            authDomain: "onnurichurch-icn-youth.firebaseapp.com",
            projectId: "onnurichurch-icn-youth",
            storageBucket: "onnurichurch-icn-youth.firebasestorage.app",
            messagingSenderId: "89074216999",
            appId: "1:89074216999:web:1798e414726b1e4af75e02"
        };
        
        const appId = 'onnuri-youth-2nd-v12';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const APP_STATE = { 
            view: 'dashboard', 
            selectedClass: null, 
            attendanceDB: {}, 
            stats: { visitor: 0 }, 
            classStructure: { "6세": [], "7세": [], "새친구 1주차": [], "새친구 2주차": [], "teachers": [] },
            newEntryType: 'student',
            lastPromotionDate: "" 
        };

        async function initAuth() {
            try { await signInAnonymously(auth); } catch (e) { showToast("DB 연결 실패"); }
        }

        onAuthStateChanged(auth, (user) => { if (user) startSync(); });

        function getDateKey() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        }

        function getSundayKey() {
            const now = new Date();
            const day = now.getDay();
            const diff = now.getDate() - day; 
            const sun = new Date(now.setDate(diff));
            return `${sun.getFullYear()}-${String(sun.getMonth() + 1).padStart(2, '0')}-${String(sun.getDate()).padStart(2, '0')}`;
        }

        async function startSync() {
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'structure'), async (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    APP_STATE.classStructure = data.map;
                    APP_STATE.lastPromotionDate = data.lastPromotionDate || "";
                    if (data.sheetUrl) document.getElementById('sheetUrlInput').value = data.sheetUrl;
                    if (data.teacherSheetUrl) document.getElementById('teacherSheetUrlInput').value = data.teacherSheetUrl;

                    await checkWeeklyPromotion();
                }
                updateUI();
            });

            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'daily_records', getDateKey()), (snap) => {
                if (snap.exists()) {
                    const d = snap.data();
                    APP_STATE.attendanceDB = d.attendanceDB || {};
                    APP_STATE.stats = d.stats || { visitor: 0 };
                }
                updateUI();
            });
        }

        async function checkWeeklyPromotion() {
            const currentSunday = getSundayKey();
            if (APP_STATE.lastPromotionDate !== currentSunday) {
                const structure = APP_STATE.classStructure;
                const week1 = structure["새친구 1주차"] || [];
                const week2 = structure["새친구 2주차"] || [];

                let targetWeek2Cls = week2[0];
                if (!targetWeek2Cls) {
                   targetWeek2Cls = { id: '2nd-새친구-2주차-기본', name: '새친구 2주차', teacher: '미지정', students: [] };
                   if(!structure["새친구 2주차"]) structure["새친구 2주차"] = [];
                   structure["새친구 2주차"].push(targetWeek2Cls);
                }

                week1.forEach(cls => {
                    cls.students.forEach(st => {
                        if (!targetWeek2Cls.students.includes(st)) {
                            targetWeek2Cls.students.push(st);
                        }
                    });
                    cls.students = []; 
                });

                APP_STATE.lastPromotionDate = currentSunday;
                await saveStructure();
                showToast("새 주일이 되어 새친구 주차가 자동 갱신되었습니다.");
            }
        }

        async function saveAttendance() {
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'daily_records', getDateKey()), { 
                attendanceDB: APP_STATE.attendanceDB, 
                stats: APP_STATE.stats, 
                updatedAt: new Date().toISOString() 
            }, { merge: true });
        }

        async function saveStructure(sUrl = "", tUrl = "") {
            const payload = { 
                map: APP_STATE.classStructure, 
                lastPromotionDate: APP_STATE.lastPromotionDate 
            };
            if (sUrl) payload.sheetUrl = sUrl;
            if (tUrl) payload.teacherSheetUrl = tUrl;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'structure'), payload);
        }

        window.syncAll = async () => {
            const sUrl = document.getElementById('sheetUrlInput').value.trim();
            const tUrl = document.getElementById('teacherSheetUrlInput').value.trim();
            if (!sUrl) return showToast("학생 명단 URL이 필요합니다.");

            setLoading(true, "데이터 분석 중...");
            try {
                const newMap = { 
                    "6세": [], 
                    "7세": [], 
                    "새친구 1주차": APP_STATE.classStructure["새친구 1주차"] || [], 
                    "새친구 2주차": APP_STATE.classStructure["새친구 2주차"] || [], 
                    "teachers": [] 
                };
                const assignedTeacherNames = new Set(); 

                const sResp = await fetch(sUrl);
                const sBuf = await sResp.arrayBuffer();
                const sText = new TextDecoder("utf-8").decode(sBuf);
                const sWb = XLSX.read(sText, { type: 'string' });
                const sRows = XLSX.utils.sheet_to_json(sWb.Sheets[sWb.SheetNames[0]], { header: 1, defval: "" });
                
                let hIdx = -1;
                let colMap = { age: -1, cls: -1, name: -1 };

                for(let i=0; i<Math.min(sRows.length, 50); i++) {
                    const row = sRows[i];
                    if (!row || !Array.isArray(row)) continue;
                    let fAge = -1, fName = -1, fCls = -1;
                    for(let j=0; j<row.length; j++) {
                        const cell = String(row[j] || "").replace(/\s/g, "");
                        if (cell.includes("나이")) fAge = j;
                        if (cell.includes("이름") || cell.includes("성명")) fName = j;
                        if (cell.includes("반")) fCls = j;
                    }
                    if (fAge !== -1 && fName !== -1) {
                        hIdx = i; colMap.age = fAge; colMap.name = fName; colMap.cls = fCls;
                        break;
                    }
                }

                if (hIdx === -1) { hIdx = 3; colMap.age = 1; colMap.cls = 2; colMap.name = 4; }

                let stickyAge = "", stickyClass = "", stickyTeachers = "미지정";

                for (let i = hIdx + 1; i < sRows.length; i++) {
                    const row = sRows[i];
                    if (!row) continue;
                    const studentName = row[colMap.name] ? String(row[colMap.name]).trim() : "";
                    if (!studentName || studentName.length < 2) continue;

                    if (row[colMap.age] && String(row[colMap.age]).trim() !== "") {
                        stickyAge = String(row[colMap.age]).replace(/[^0-9]/g, "") + "세";
                    }
                    if (row[colMap.cls] && String(row[colMap.cls]).trim() !== "") {
                        const raw = String(row[colMap.cls]);
                        stickyClass = raw.split(/[\n(]/)[0].trim();
                        const tMatches = raw.match(/\((.*?)\)/g);
                        if (tMatches) {
                            const ts = tMatches.map(m => m.replace(/[()]/g, '').replace('선생님', '').trim()).filter(n => n.length >= 2);
                            ts.forEach(t => assignedTeacherNames.add(t));
                            stickyTeachers = ts.join('/');
                        } else { stickyTeachers = "미지정"; }
                    }

                    if (stickyClass.includes('새친구')) {
                        let found = false;
                        [...newMap["새친구 1주차"], ...newMap["새친구 2주차"]].forEach(c => {
                            if (c.students.includes(studentName)) found = true;
                        });

                        if (!found) {
                            let week1Cls = newMap["새친구 1주차"].find(c => c.name.includes("1주차"));
                            if (!week1Cls) {
                                week1Cls = { id: '2nd-새친구-1주차-기본', name: '새친구 1주차', teacher: '미지정', students: [] };
                                newMap["새친구 1주차"].push(week1Cls);
                            }
                            week1Cls.students.push(studentName);
                        }
                    } else {
                        const key = stickyAge;
                        if (!newMap[key]) continue;
                        let targetCls = newMap[key].find(c => c.name === stickyClass);
                        if (!targetCls) {
                            targetCls = { id: `2nd-${key}-${stickyClass}`, name: stickyClass, teacher: stickyTeachers, students: [] };
                            newMap[key].push(targetCls);
                        }
                        if (!targetCls.students.includes(studentName)) targetCls.students.push(studentName);
                    }
                }

                if (tUrl) {
                    const tResp = await fetch(tUrl);
                    const tBuf = await tResp.arrayBuffer();
                    const tText = new TextDecoder("utf-8").decode(tBuf);
                    const tWb = XLSX.read(tText, { type: 'string' });
                    const tRows = XLSX.utils.sheet_to_json(tWb.Sheets[tWb.SheetNames[0]], { header: 1, defval: "" });
                    let thIdx = -1;
                    for(let i=0; i<Math.min(tRows.length, 30); i++) {
                        if (tRows[i].some(c => String(c).includes('이름'))) { thIdx = i; break; }
                    }
                    if (thIdx !== -1) {
                        const head = tRows[thIdx], ni = head.findIndex(h => String(h).includes('이름')), pi = head.findIndex(h => ["부", "예배", "구분"].some(k => String(h).includes(k)));
                        for (let i = thIdx + 1; i < tRows.length; i++) {
                            const r = tRows[i], tName = r[ni] ? String(r[ni]).trim() : "", tPart = pi !== -1 ? String(r[pi]) : "", rowText = r.join("|");
                            if (tName && (tPart.includes('2') || rowText.includes('유치2') || ["교역자", "전도사", "목사"].some(k => rowText.includes(k)))) {
                                if (!assignedTeacherNames.has(tName)) {
                                    if (!newMap.teachers.includes(tName)) newMap.teachers.push(tName);
                                }
                            }
                        }
                    }
                }

                APP_STATE.classStructure = newMap;
                await saveStructure(sUrl, tUrl);
                showToast("동기화 완료! 새친구 현황을 확인하세요.");
                showHome();
            } catch (err) {
                showToast("분석 실패: " + err.message);
            } finally {
                setLoading(false);
            }
        };

        window.showHome = () => { APP_STATE.view = 'dashboard'; renderView(); };
        window.showSettings = () => { APP_STATE.view = 'settings'; renderView(); };
        window.goBack = () => { APP_STATE.view = 'dashboard'; renderView(); };

        function renderView() {
            ['view-dashboard', 'view-attendance', 'view-settings'].forEach(id => {
                document.getElementById(id).style.display = id === `view-${APP_STATE.view}` ? 'block' : 'none';
            });
            document.getElementById('backBtn').classList.toggle('invisible', APP_STATE.view === 'dashboard');
            document.getElementById('nav-home').classList.toggle('text-blue-600', APP_STATE.view === 'dashboard');
            document.getElementById('nav-settings').classList.toggle('text-blue-600', APP_STATE.view === 'settings');
            updateUI();
        }

        function updateUI() {
            if (APP_STATE.view === 'dashboard') renderDashboard();
            else if (APP_STATE.view === 'attendance') renderAttendance();
        }

        function renderDashboard() {
            const c = { s6: 0, s7: 0, t: 0, new1: 0, new2: 0 };
            for (const cid in APP_STATE.attendanceDB) {
                const r = APP_STATE.attendanceDB[cid];
                for (const n in r) {
                    if (r[n]) {
                        if (n.includes('(교사)') || cid.includes('-teachers')) c.t++;
                        else if (cid.includes('1주차')) c.new1++;
                        else if (cid.includes('2주차')) c.new2++;
                        else if (cid.includes('6세')) c.s6++;
                        else if (cid.includes('7세')) c.s7++;
                    }
                }
            }
            const stats = [
                { label: '6세 어린이', color: 'blue', val: c.s6 },
                { label: '7세 어린이', color: 'green', val: c.s7 },
                { label: '지원팀 및 교역자', color: 'purple', val: c.t },
                { label: '새친구 1주차', color: 'amber', val: c.new1 },
                { label: '새친구 2주차', color: 'orange', val: c.new2 },
                { label: '방문자 총합', color: 'slate', val: APP_STATE.stats.visitor }
            ];
            document.getElementById('stat-rows-container').innerHTML = stats.map(s => `
                <div class="grid grid-cols-2 items-center p-4">
                    <span class="text-xs font-extrabold text-slate-700">${s.label}</span>
                    <div class="text-right font-black text-${s.color}-600 text-lg">${s.val}명</div>
                </div>
            `).join('');

            const classContainer = document.getElementById('class-lists-container'); 
            classContainer.innerHTML = '';
            
            // 1. 새친구 섹션 (1주차, 2주차를 한 줄에 모음)
            const nfSection = document.createElement('div');
            nfSection.className = "space-y-3";
            nfSection.innerHTML = `
                <h3 class="font-bold text-slate-800 ml-1 flex items-center gap-2">
                    <i class="fa-solid fa-wand-magic-sparkles text-amber-500 text-sm"></i> 새친구 현황
                </h3>
                <div class="grid grid-cols-2 gap-3" id="newfriends-buttons-grid"></div>
            `;
            classContainer.appendChild(nfSection);
            const nfGrid = nfSection.querySelector('#newfriends-buttons-grid');
            
            ['새친구 1주차', '새친구 2주차'].forEach(key => {
                let classes = APP_STATE.classStructure[key] || [];
                if (classes.length === 0) {
                    const defId = `2nd-${key.replace(/ /g, '-')}-기본`;
                    classes = [{ id: defId, name: key, teacher: '미지정', students: [] }];
                }
                classes.forEach(cls => {
                    const count = Object.values(APP_STATE.attendanceDB[cls.id] || {}).filter(v => v === true).length;
                    const btn = document.createElement('button');
                    btn.onclick = () => selectClassById(cls.id, key);
                    btn.className = "p-5 bg-white border border-slate-100 rounded-[1.5rem] text-left shadow-sm active:scale-95 transition-all";
                    btn.innerHTML = `
                        <p class="font-black text-slate-800">${cls.name}</p>
                        <p class="text-[10px] text-slate-400 truncate">주차별 자동관리</p>
                        ${count > 0 ? `<div class="mt-2 text-[9px] text-blue-600 font-black bg-blue-50 px-2 py-0.5 rounded-full inline-block">${count}명 출석</div>` : ''}
                    `;
                    nfGrid.appendChild(btn);
                });
            });

            // 2. 연령별 섹션 (기존 레이아웃 유지)
            [
                { key: '6세', icon: 'fa-child', color: 'text-blue-500' },
                { key: '7세', icon: 'fa-graduation-cap', color: 'text-green-500' }
            ].forEach(group => {
                const classes = APP_STATE.classStructure[group.key] || [];
                if (classes.length === 0) return;

                const section = document.createElement('div');
                section.className = "space-y-3";
                section.innerHTML = `
                    <h3 class="font-bold text-slate-800 ml-1 flex items-center gap-2">
                        <i class="fa-solid ${group.icon} ${group.color} text-sm"></i> ${group.key} 학급
                    </h3>
                    <div class="grid grid-cols-2 gap-3">
                        ${classes.map(cls => {
                            const count = Object.values(APP_STATE.attendanceDB[cls.id] || {}).filter(v => v === true).length;
                            return `
                                <button onclick="selectClassById('${cls.id}', '${group.key}')" class="p-5 bg-white border border-slate-100 rounded-[1.5rem] text-left shadow-sm active:scale-95 transition-all">
                                    <p class="font-black text-slate-800">${cls.name}</p>
                                    <p class="text-[10px] text-slate-400 truncate">${cls.teacher}</p>
                                    ${count > 0 ? `<div class="mt-2 text-[9px] text-blue-600 font-black bg-blue-50 px-2 py-0.5 rounded-full inline-block">${count}명 출석</div>` : ''}
                                </button>
                            `;
                        }).join('')}
                    </div>
                `;
                classContainer.appendChild(section);
            });

            const tCount = Object.values(APP_STATE.attendanceDB['2nd-t-teachers'] || {}).filter(v => v === true).length;
            document.getElementById('teacher-unassigned-container').innerHTML = `
                <button onclick='window.openTeachers()' class="w-full p-5 bg-slate-900 text-white rounded-[1.5rem] text-left shadow-lg relative overflow-hidden active:scale-95 transition-all">
                    <div class="relative z-10">
                        <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-1">Support & Leadership</p>
                        <p class="font-black text-lg">사역 지원팀 및 교역자</p>
                        <p class="text-[10px] opacity-60">명단 수: ${APP_STATE.classStructure.teachers?.length || 0}명</p>
                        ${tCount > 0 ? `<div class="mt-2 text-[10px] bg-blue-600 px-3 py-1 rounded-full inline-block font-black">${tCount}명 체크완료</div>` : ''}
                    </div>
                </button>
            `;
            document.getElementById('displayDate').innerText = `${new Date().getMonth()+1}/${new Date().getDate()}`;
        }

        window.selectClassById = (id, groupKey) => {
            const cls = APP_STATE.classStructure[groupKey].find(c => c.id === id);
            if (cls) { APP_STATE.selectedClass = cls; APP_STATE.view = 'attendance'; renderView(); }
        };

        window.openTeachers = () => {
            APP_STATE.selectedClass = { id: '2nd-t-teachers', name: '사역 지원팀', teacher: '유치2부 운영 및 지원', students: [] };
            APP_STATE.view = 'attendance'; renderView();
        };

        function renderAttendance() {
            const cls = APP_STATE.selectedClass; if (!cls) return;
            document.getElementById('targetClassName').innerText = cls.name;
            let ageLabel = cls.id.includes('teachers') ? '사역지원' : (cls.id.includes('1주차') ? '새친구 1주' : (cls.id.includes('2주차') ? '새친구 2주' : (cls.id.includes('6세') ? '6세' : '7세')));
            document.getElementById('targetClassAge').innerText = ageLabel;
            document.getElementById('targetClassTeacher').innerText = cls.teacher;
            const cont = document.getElementById('members-list'); cont.innerHTML = '';
            const recs = APP_STATE.attendanceDB[cls.id] || {};
            const drawRow = (name, isT) => {
                const isP = recs[name] || false;
                const row = document.createElement('div');
                row.className = `flex items-center justify-between p-4 rounded-3xl border ${isP ? 'bg-blue-50 border-blue-200' : 'bg-white border-slate-100'}`;
                row.innerHTML = `<div class="flex items-center gap-3"><span class="font-extrabold ${isP ? 'text-blue-900' : 'text-slate-700'}">${name.split('(')[0]}</span>${isT ? '<span class="text-[8px] bg-purple-600 text-white px-1.5 py-0.5 rounded font-black">T</span>' : ''}</div><div class="flex gap-2"><button onclick="setStatus('${cls.id}', '${name}', true)" class="w-12 py-2 rounded-xl text-xs font-black ${isP ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}">출석</button><button onclick="setStatus('${cls.id}', '${name}', false)" class="w-12 py-2 rounded-xl text-xs font-black ${!isP && recs.hasOwnProperty(name) ? 'bg-slate-600 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}">결석</button></div>`;
                cont.appendChild(row);
            };
            if (cls.id.includes('teachers')) { (APP_STATE.classStructure.teachers || []).forEach(t => drawRow(t, true)); } 
            else { 
                if (cls.teacher !== '미지정') {
                    cls.teacher.split(/[/,]/).forEach(t => { if(t.trim()) drawRow(`${t.trim()}(교사)`, true); }); 
                }
                cls.students.forEach(s => drawRow(s, false)); 
            }
        }

        window.setStatus = async (cid, n, s) => {
            if (!APP_STATE.attendanceDB[cid]) APP_STATE.attendanceDB[cid] = {};
            APP_STATE.attendanceDB[cid][n] = s;
            renderAttendance(); await saveAttendance();
        };

        window.adjustCounter = async (type, amount) => {
            APP_STATE.stats[type] += amount;
            await saveAttendance(); showToast("수동 인원이 반영되었습니다.");
        };

        window.exportExcel = () => {
            const date = getDateKey(), data = [["날짜", "부서", "구분", "반", "이름", "출석여부"]], s = APP_STATE.classStructure;
            for (const g in s) {
                if (g === 'teachers') continue;
                s[g].forEach(cls => {
                    const rec = APP_STATE.attendanceDB[cls.id] || {};
                    if (cls.teacher !== '미지정') {
                        cls.teacher.split(/[/,]/).forEach(t => { if(t.trim()) data.push([date, "2부", "교사(반)", cls.name, t.trim(), rec[`${t.trim()}(교사)`] ? "출석" : "결석"]); });
                    }
                    cls.students.forEach(st => data.push([date, "2부", "학생", cls.name, st, rec[st] ? "출석" : "결석"]));
                });
            }
            const tRec = APP_STATE.attendanceDB['2nd-t-teachers'] || {};
            (s.teachers || []).forEach(t => data.push([date, "2부", "사역지원", "유치부", t, tRec[t] ? "출석" : "결석"]));
            const ws = XLSX.utils.aoa_to_sheet(data), wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Attendance");
            XLSX.writeFile(wb, `Youth_2nd_${date}.xlsx`);
        };

        window.resetTodayData = () => {
            if(confirm("정말로 오늘 기록을 초기화할까요?")) {
                APP_STATE.attendanceDB = {}; APP_STATE.stats = { visitor: 0 };
                saveAttendance(); showHome(); showToast("초기화 완료");
            }
        };

        window.openEntryModal = () => document.getElementById('add-entry-modal').style.display = 'flex';
        window.closeEntryModal = () => document.getElementById('add-entry-modal').style.display = 'none';
        window.setEntryType = (t) => {
            APP_STATE.newEntryType = t;
            document.getElementById('type-student').className = t==='student' ? "py-2 rounded-xl font-black text-xs bg-white text-blue-600" : "py-2 rounded-xl font-black text-xs text-slate-400";
            document.getElementById('type-teacher').className = t==='teacher' ? "py-2 rounded-xl font-black text-xs bg-white text-purple-600" : "py-2 rounded-xl font-black text-xs text-slate-400";
        };

        window.submitNewMember = async () => {
            const name = document.getElementById('entryName').value.trim();
            if(!name) return;
            const cls = APP_STATE.selectedClass; if (!cls) return;
            if (cls.id.includes('teachers')) {
                if (!APP_STATE.classStructure.teachers.includes(name)) APP_STATE.classStructure.teachers.push(name);
            } else {
                for (const groupKey in APP_STATE.classStructure) {
                    const group = APP_STATE.classStructure[groupKey];
                    if (Array.isArray(group)) {
                        const target = group.find(c => c.id === cls.id);
                        if (target) {
                            if (APP_STATE.newEntryType === 'student') { if (!target.students.includes(name)) target.students.push(name); } 
                            else { 
                                if (target.teacher === '미지정') target.teacher = name;
                                else target.teacher += ',' + name;
                            }
                            break;
                        }
                    }
                }
            }
            await saveStructure(); renderAttendance(); closeEntryModal(); showToast("추가되었습니다.");
        };

        function setLoading(s, t = "") {
            document.getElementById('loading-overlay').style.display = s ? 'flex' : 'none';
            if (t) document.getElementById('loading-text').innerText = t;
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.add('opacity-100', 'bottom-28');
            setTimeout(() => t.classList.remove('opacity-100', 'bottom-28'), 3000);
        }

        initAuth();
    </script>
</body>
</html>
